<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Bolsa BotC">
    <link rel="apple-touch-icon" href="https://villacuervos.es/img/main-logo.png">
    
    <title>Bolsa Digital - Blood on the Clocktower</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Quicksand:wght@300;500&display=swap');

        :root {
            --purple-dark: #0a0414;
            --purple-mid: #1d0b3a;
            --purple-light: #5a189a;
            --good-blue: #0077b6;
            --evil-red: #9b2226;
            --text: #f0f0f0;
            --accent: #ffb703;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--purple-dark);
            background-image: radial-gradient(circle at center, rgba(61, 21, 94, 0.5) 0%, rgba(10, 4, 20, 1) 100%), url('https://villacuervos.es/assets/background-side-D8vAczLs.webp');
            color: var(--text);
            font-family: 'Quicksand', sans-serif;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        .screen { display: none; width: 100%; height: 100vh; padding: 20px; flex-direction: column; align-items: center; justify-content: flex-start; animation: fadeIn 0.4s; }
        .active { display: flex; }

        h2, .type-header { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; }
        .main-logo { width: 80%; max-width: 280px; margin-bottom: 20px; }

        .btn {
            background: var(--purple-light); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 18px; margin: 10px 0; border-radius: 12px; font-weight: bold;
            cursor: pointer; text-transform: uppercase; width: 100%; font-size: 1rem;
        }
        .btn:disabled { opacity: 0.3; }

        .selection-container {
            width: 100%; flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.5);
            padding: 15px; border-radius: 20px; border: 1px solid var(--purple-mid); margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }
        
        .type-section { margin-bottom: 25px; }
        .type-info { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--purple-light); padding-bottom: 8px; margin-bottom: 12px; }
        .count-badge { background: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        .count-ok { color: #00ff88; border: 1px solid #00ff88; }
        .count-pending { color: var(--accent); border: 1px solid var(--accent); }

        .role-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; }
        .role-item { font-size: 0.7rem; padding: 10px 4px; border: 1px solid #444; border-radius: 8px; background: #111; text-align: center; text-transform: uppercase; min-height: 45px; display: flex; align-items: center; justify-content: center; }
        .role-item.selected { background: var(--purple-light); border-color: #fff; }
        .role-item.special-selected { background: #ff5400; border-color: #fff; font-weight: bold; }

        .godfather-config { background: #2a0a0a; border: 1px solid var(--evil-red); padding: 10px; border-radius: 10px; margin-bottom: 15px; width: 100%; }
        .gf-options { display: flex; gap: 10px; margin-top: 5px; }
        .gf-btn { flex: 1; padding: 8px; border-radius: 5px; border: 1px solid #666; background: #333; color: white; font-size: 0.7rem; }
        .gf-btn.active { background: var(--evil-red); border-color: white; }

        #scr-draw { justify-content: center; text-align: center; }
        #draw-prompt { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        #draw-prompt img { width: 180px; height: auto; animation: pulse 2s infinite; filter: drop-shadow(0 0 20px rgba(155, 34, 38, 0.4)); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        .token-display { 
            background: #000; border: 10px solid; border-radius: 50%; 
            width: 75vw; height: 75vw; max-width: 300px; max-height: 300px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .token-display img { width: 65%; object-fit: contain; }

        .blue-glow { border-color: var(--good-blue); box-shadow: 0 0 40px var(--good-blue); }
        .red-glow { border-color: var(--evil-red); box-shadow: 0 0 40px var(--evil-red); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="scr-load" class="screen active" style="justify-content: center;">
        <img src="https://wiki.bloodontheclocktower.com/skins/pivot/assets/images/logo.png" alt="BOTC" class="main-logo">
        <div style="margin: 20px 0; border: 1px dashed var(--purple-light); padding: 25px; background: rgba(0,0,0,0.3); border-radius: 15px; width: 100%;">
            <input type="file" id="file-input" accept=".json" style="width: 100%;">
        </div>
        <button id="btn-to-setup" class="btn" disabled onclick="switchScreen('scr-setup')">Siguiente</button>
    </div>

    <div id="scr-setup" class="screen" style="justify-content: center;">
        <h2 style="margin-bottom: 20px;">Jugadores Base</h2>
        <input type="number" id="p-count" value="7" min="5" max="15" style="width: 100px; padding: 15px; font-size: 2.5rem; background: #000; color: #fff; border: 2px solid var(--purple-light); border-radius: 15px; text-align: center; margin-bottom: 30px;">
        <button class="btn" onclick="startSelection()">Configurar Bolsa</button>
    </div>

    <div id="scr-selection" class="screen">
        <h2 id="total-bag-info" style="color: var(--accent); margin-bottom: 10px;">Bolsa: 0 / 7</h2>
        
        <div id="gf-panel" class="godfather-config" style="display:none">
            <div style="font-size: 0.8rem; font-weight: bold; color: var(--evil-red);">HABILIDAD DEL PADRINO:</div>
            <div class="gf-options">
                <button id="gf-add" class="gf-btn" onclick="setGFMod(1)">+1 FORASTERO (-1 ALD)</button>
                <button id="gf-rem" class="gf-btn" onclick="setGFMod(-1)">-1 FORASTERO (+1 ALD)</button>
            </div>
        </div>

        <div class="selection-container">
            <div id="sections-wrapper"></div>
        </div>
        <button id="btn-confirm-bag" class="btn" disabled onclick="finalizeSetup()">Confirmar Bolsa</button>
    </div>

    <div id="scr-draw" class="screen" onclick="handleDraw()">
        <div id="draw-prompt">
            <img src="https://villacuervos.es/img/main-logo.png" alt="Logo">
            <p style="font-family: 'Cinzel'; margin-top: 20px; color: #888; font-size: 0.8rem; letter-spacing: 3px;">TOCA PARA REVELAR</p>
        </div>
        <div id="draw-reveal" style="display:none; flex-direction: column; align-items: center;">
            <div id="token-frame" class="token-display">
                <img id="t-img" src="" alt="Token">
                <div id="t-name" style="margin-top: 15px; font-size: 1.3rem; font-family: 'Cinzel';"></div>
            </div>
            <p style="color:#666; font-size:0.8rem; margin-top:30px;">TOCA PARA OCULTAR</p>
        </div>
    </div>

    <script>
        const DB = {
            townsfolk: ['chef', 'washerwoman', 'clockmaker', 'grandmother', 'librarian', 'juggler', 'soldier', 'ravenkeeper', 'sage', 'tealady', 'mayor', 'fool', 'virgin', 'empath', 'fortuneteller', 'undertaker', 'innkeeper', 'monk', 'exorcist', 'poppygrower', 'slayer', 'chambermaid', 'mathematician', 'dreamer', 'flowergirl', 'oracle', 'gambler'],
            outsiders: ['drunk', 'tinker', 'klutz', 'barber', 'lunatic', 'plaguedoctor', 'mutant', 'sweetheart', 'saint', 'butler', 'recluse'],
            minions: ['godfather', 'poisoner', 'devilsadvocate', 'witch', 'assassin', 'summoner', 'eviltwin', 'baron', 'scarletwoman', 'spy', 'cerenovus', 'fearmonger'],
            demons: ['alhadikhia', 'pukka', 'imp', 'po', 'fanggu', 'zombuul', 'shabaloth', 'nodashii', 'vortox', 'vigormortis'],
            travelers: ['gunslinger', 'gangster', 'bonecollector', 'apprentice', 'scapegoat', 'beggar', 'bureaucrat', 'thief', 'butcher', 'harlot', 'barista', 'deviant', 'judge', 'matron', 'bishop', 'voudon', 'cacklejack']
        };

        const TRADUCCIONES = { alhadikhia: "Al-Hadikhia", empath: "Empático", fortuneteller: "Vidente", undertaker: "Enterrador", innkeeper: "Posadero", monk: "Monje", exorcist: "Exorcista", poppygrower: "Amapolas", drunk: "Borracho", baron: "Barón", poisoner: "Envenenador", scarletwoman: "Escarlata", spy: "Espía", imp: "Imp", washerwoman: "Lavandera", librarian: "Bibliotecario", chef: "Chef", slayer: "Cazador", soldier: "Soldado", mayor: "Alcalde", virgin: "Virgen", ravenkeeper: "Cuidador", tealady: "Dama del Té", grandmother: "Abuela", clockmaker: "Relojero", fool: "Bufón", tinker: "Chatarrero", juggler: "Malabarista", sage: "Sabio", klutz: "Patoso", barber: "Barbero", godfather: "Padrino", devilsadvocate: "Abogado", witch: "Bruja" };

        let scriptData = []; let playerCount = 7; let baseDist = {}; let selectedRoles = new Set();
        let drunkSelected = false; let gfMod = 0; let drawPile = []; let revealed = false;

        // CARGADOR ASÍNCRONO PARA EVITAR BLOQUEOS
        document.getElementById('file-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    scriptData = data.filter(i => i.id !== "_meta");
                    document.getElementById('btn-to-setup').disabled = false;
                } catch(e) { alert("Error: JSON no válido"); }
            };
            reader.readAsText(file);
        });

        function startSelection() {
            playerCount = parseInt(document.getElementById('p-count').value);
            if(playerCount == 5) baseDist = {t:3, o:0, m:1, d:1};
            else if(playerCount == 6) baseDist = {t:3, o:1, m:1, d:1};
            else if(playerCount == 7) baseDist = {t:5, o:0, m:1, d:1};
            else if(playerCount == 8) baseDist = {t:5, o:1, m:1, d:1};
            else if(playerCount == 9) baseDist = {t:5, o:2, m:1, d:1};
            else if(playerCount <= 12) baseDist = {t:7, o:playerCount-9, m:2, d:1};
            else baseDist = {t:9, o:playerCount-12, m:3, d:1};
            
            selectedRoles.clear(); drunkSelected = false; gfMod = 0;
            updateUI(); switchScreen('scr-setup'); // Corregido: solo cambia a setup tras cargar
            switchScreen('scr-selection');
        }

        function setGFMod(val) {
            gfMod = (gfMod === val) ? 0 : val;
            updateUI();
        }

        function updateUI() {
            const wrapper = document.getElementById('sections-wrapper');
            wrapper.innerHTML = "";
            let modO = 0; let modT = 0;
            const ids = Array.from(selectedRoles).map(r => r.id.toLowerCase().replace(/[-_]/g,''));
            
            const hasGF = ids.includes('godfather');
            document.getElementById('gf-panel').style.display = hasGF ? 'block' : 'none';
            document.getElementById('gf-add').className = `gf-btn ${gfMod === 1 ? 'active' : ''}`;
            document.getElementById('gf-rem').className = `gf-btn ${gfMod === -1 ? 'active' : ''}`;
            if(hasGF) { modO += gfMod; modT -= gfMod; }

            if (ids.includes('baron')) { modO += 2; modT -= 2; }
            if (ids.includes('fanggu')) { modO += 1; modT -= 1; }
            if (drunkSelected) modT += 1;

            const needed = { townsfolk: baseDist.t + modT, outsiders: baseDist.o + modO, minions: baseDist.m, demons: baseDist.d };
            let allStepsDone = true;

            ['townsfolk', 'outsiders', 'minions', 'demons'].forEach(type => {
                const roles = scriptData.filter(r => DB[type].includes(r.id.toLowerCase().replace(/[-_]/g,'')));
                if (roles.length === 0) return;
                let selInType = Array.from(selectedRoles).filter(r => DB[type].includes(r.id.toLowerCase().replace(/[-_]/g,'')));
                let visualCount = selInType.length + (type === 'outsiders' && drunkSelected ? 1 : 0);
                if (visualCount !== needed[type]) allStepsDone = false;
                const section = document.createElement('div');
                section.className = 'type-section';
                section.innerHTML = `<div class="type-info"><span class="type-header">${type}</span><span class="count-badge ${visualCount === needed[type] ? 'count-ok' : 'count-pending'}">${visualCount} / ${needed[type]}</span></div>`;
                const grid = document.createElement('div'); grid.className = 'role-grid';
                roles.forEach(role => {
                    const id = role.id.toLowerCase().replace(/[-_]/g,'');
                    const item = document.createElement('div');
                    let isSel = (id === 'drunk') ? drunkSelected : selectedRoles.has(role);
                    item.className = `role-item ${isSel ? (id === 'drunk' ? 'special-selected' : 'selected') : ''}`;
                    item.innerText = TRADUCCIONES[id] || role.id;
                    item.onclick = () => {
                        if(id === 'drunk') drunkSelected = !drunkSelected;
                        else selectedRoles.has(role) ? selectedRoles.delete(role) : selectedRoles.add(role);
                        updateUI();
                    };
                    grid.appendChild(item);
                });
                section.appendChild(grid); wrapper.appendChild(section);
            });
            document.getElementById('total-bag-info').innerText = `Bolsa: ${selectedRoles.size} / ${playerCount}`;
            document.getElementById('btn-confirm-bag').disabled = !allStepsDone || selectedRoles.size !== playerCount;
        }

        function finalizeSetup() {
            drawPile = Array.from(selectedRoles).sort(() => 0.5 - Math.random());
            switchScreen('scr-draw');
        }

        function handleDraw() {
            if (!revealed) {
                if (drawPile.length === 0) return location.reload();
                const role = drawPile.pop();
                const id = role.id.toLowerCase().replace(/[-_]/g,'');
                const isEvil = DB.minions.concat(DB.demons).includes(id);
                document.getElementById('token-frame').className = 'token-display ' + (isEvil ? 'red-glow' : 'blue-glow');
                document.getElementById('t-name').innerText = TRADUCCIONES[id] || role.id.toUpperCase();
                document.getElementById('t-name').style.color = isEvil ? 'var(--evil-red)' : 'var(--good-blue)';
                document.getElementById('t-img').src = `https://villacuervos.es/guiones/img/${id}.png`;
                document.getElementById('t-img').onerror = function() { this.src = `https://wiki.bloodontheclocktower.com/Special:FilePath/Icon_${role.id}.png`; };
                document.getElementById('draw-prompt').style.display = 'none';
                document.getElementById('draw-reveal').style.display = 'flex';
                revealed = true;
            } else {
                document.getElementById('draw-prompt').style.display = 'flex';
                document.getElementById('draw-reveal').style.display = 'none';
                revealed = false;
            }
        }

        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
